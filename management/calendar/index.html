<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者専用 - 横浜創英中学・高等学校 清掃ラボ</title>
    
    <link rel="icon" href="https://ataro-qqq.github.io/yscl/img/favicon/YSCL favi.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://ataro-qqq.github.io/yscl/script/tailwind.js"></script>
    <link rel="stylesheet" href="https://ataro-qqq.github.io/yscl/style/style.css">
</head>
<body class="min-h-screen flex flex-col text-gray-800 antialiased relative">
    <div class="fixed inset-0 bg-overlay -z-10"></div>

    <header class="glass-card sticky top-0 z-50 border-b border-white/60">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='https://ataro-qqq.github.io/yscl/';">
                    <img src="https://ataro-qqq.github.io/yscl/img/rogomoji.png" alt="清掃ラボ ロゴ" class="h-10 sm:h-12 w-auto drop-shadow-md">
                </div>
                <div class="flex items-center gap-2 font-bold text-gray-600">
                    <i data-lucide="lock" class="w-5 h-5"></i>
                    管理者専用ページ
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl mx-auto w-full px-4 py-10 sm:py-16">
        
        <!-- ==============================================
             ログインフォーム
        =============================================== -->
        <section id="login-section" class="glass-card rounded-[2rem] p-8 md:p-12 shadow-xl border-t-4 border-gray-800 text-center animate-fade-in-up">
            <div class="inline-flex items-center justify-center p-4 bg-gray-100 text-gray-700 rounded-2xl mb-6 shadow-sm">
                <i data-lucide="user-check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-black text-gray-800 mb-2">管理者ログイン</h1>
            <p class="text-gray-500 font-medium mb-8">管理用アカウントでログインしてください。</p>

            <form id="login-form" class="max-w-md mx-auto space-y-5 text-left">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">メールアドレス (ID)</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 shadow-sm focus:border-brand focus:ring focus:ring-brand focus:ring-opacity-50 bg-white">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">パスワード</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-xl border border-gray-300 shadow-sm focus:border-brand focus:ring focus:ring-brand focus:ring-opacity-50 bg-white">
                </div>
                
                <div id="login-error" class="hidden text-red-500 font-bold text-sm text-center bg-red-50 p-3 rounded-lg border border-red-200">
                    ログインに失敗しました。IDかパスワードが間違っています。
                </div>

                <button type="submit" id="login-btn" class="w-full bg-gray-800 text-white font-bold py-3 px-6 rounded-xl hover:bg-gray-700 shadow-md transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    ログインする
                </button>
            </form>
        </section>

        <!-- ==============================================
             スケジュール入力フォーム
        =============================================== -->
        <section id="admin-section" class="hidden glass-card rounded-[2rem] p-8 md:p-12 shadow-xl border-t-4 border-brand animate-fade-in-up">
            <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
                <h1 class="text-2xl font-black text-gray-800 flex items-center gap-2">
                    <i data-lucide="calendar-plus" class="text-brand w-7 h-7"></i>
                    予定の追加
                </h1>
                <button id="logout-btn" class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors flex items-center gap-1">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    ログアウト
                </button>
            </div>

            <form id="add-event-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">日付</label>
                        <input type="date" id="event-date" required class="w-full px-4 py-3 rounded-xl border border-gray-300 shadow-sm focus:border-brand focus:ring bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">種類</label>
                        <select id="event-type" class="w-full px-4 py-3 rounded-xl border border-gray-300 shadow-sm focus:border-brand focus:ring bg-white">
                            <option value="cleaning">定期清掃</option>
                            <option value="eco">エコ活動</option>
                            <option value="event">イベント・MTG</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">タイトル</label>
                    <input type="text" id="event-title" placeholder="例：校庭の落ち葉拾い" required class="w-full px-4 py-3 rounded-xl border border-gray-300 shadow-sm focus:border-brand focus:ring bg-white">
                </div>

                <div id="add-success" class="hidden text-green-600 font-bold text-sm text-center bg-green-50 p-3 rounded-lg border border-green-200">
                    予定をデータベースに保存しました！
                </div>

                <button type="submit" id="submit-event-btn" class="w-full bg-brand text-white font-bold py-4 px-6 rounded-xl hover:bg-brand-dark shadow-md transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    この予定を追加する
                </button>
            </form>
        </section>

    </main>

       <footer class="bg-gray-900 mt-auto border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                
                <div class="flex flex-col items-center md:items-start gap-4">
                    <img src="https://ataro-qqq.github.io/yscl/img/rogomojiw.png" alt="清掃ラボ ロゴ" class="h-8 w-auto opacity-75 brightness-0 invert">
                    <div class="bg-gray-800 px-4 py-2 rounded-full text-sm font-bold text-gray-300 shadow-sm flex items-center gap-2 border border-gray-700">
                        <i data-lucide="clock" class="w-4 h-4 text-brand-light"></i>
                        <span id="datetime-display">日時を取得中...</span>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-3 text-sm text-gray-400 font-medium">
                    <div class="flex flex-wrap justify-center gap-4 mb-1">
                        <a href="https://www.soei.ed.jp/" class="hover:text-white transition-colors bg-gray-800 px-3 py-1 rounded-full border border-gray-700">学校HP</a>
                        <a href="https://www.soei.ed.jp/s_junior/j_club/" class="hover:text-white transition-colors bg-gray-800 px-3 py-1 rounded-full border border-gray-700">クラブ活動</a>
                        <button onclick="window.location.href='https://ataro-qqq.github.io/yscl/';" class="hover:text-white transition-colors cursor-pointer bg-gray-800 px-3 py-1 rounded-full border border-gray-700">ホームへ戻る</button>
                    </div>
                    <p class="text-xs">※お使いの端末によっては、正しく表示されない場合がございます。</p>
                    <p>&copy; 2023 YOKOHAMA SOEI Junior & Senior High School Cleaning lab</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://ataro-qqq.github.io/yscl/script/index.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const loginSection = document.getElementById('login-section');
        const adminSection = document.getElementById('admin-section');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const addEventForm = document.getElementById('add-event-form');
        const addSuccess = document.getElementById('add-success');
        const submitEventBtn = document.getElementById('submit-event-btn');

        let db, auth, appId;

        function initFirebase() {
            let firebaseConfig;
            
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'yscl-demo-app';
            } else {
                // ここにFirebase Configを入れる
                firebaseConfig = {
                    // apiKey: "あなたのAPIキー",
                    // authDomain: "あなたのプロジェクト.firebaseapp.com",
                    // projectId: "あなたのプロジェクト",
                    // ...
                };
                appId = 'yscl-production'; // 任意のアプリID
            }

            if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        loginSection.classList.add('hidden');
                        adminSection.classList.remove('hidden');
                        console.log("管理者としてログインしました");
                    } else {
                        loginSection.classList.remove('hidden');
                        adminSection.classList.add('hidden');
                    }
                });
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const loginBtn = document.getElementById('login-btn');

            loginBtn.innerText = "確認中...";
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                console.error("ログインエラー:", error);
                loginError.classList.remove('hidden');
            } finally {
                loginBtn.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> ログインする';
                loginBtn.disabled = false;
                lucide.createIcons();
            }
        });

        logoutBtn.addEventListener('click', async () => {
            if(confirm("ログアウトしますか？")) {
                await signOut(auth);
            }
        });

        addEventForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const date = document.getElementById('event-date').value;
            const title = document.getElementById('event-title').value;
            const type = document.getElementById('event-type').value;
            
            submitEventBtn.innerText = "保存中...";
            submitEventBtn.disabled = true;
            addSuccess.classList.add('hidden');

            if (auth.currentUser) {
                try {
                    const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedule_events');
                    
                    await addDoc(eventsRef, { 
                        date: date, 
                        title: title, 
                        type: type, 
                        createdAt: new Date(),
                        createdBy: auth.currentUser.email
                    });
                    
                    addSuccess.classList.remove('hidden');
                    addEventForm.reset();
                    
                    setTimeout(() => {
                        addSuccess.classList.add('hidden');
                    }, 3000);
                    
                } catch (error) {
                    console.error("保存エラー:", error);
                    alert("保存に失敗しました。権限がない可能性があります。");
                }
            }
            
            submitEventBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i> この予定を追加する';
            submitEventBtn.disabled = false;
            lucide.createIcons();
        });

        initFirebase();
    </script>
</body>
</html>
