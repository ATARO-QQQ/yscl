    <script src="https://ataro-qqq.github.io/yscl/script/index.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let currentDate = new Date();
        let allEvents = [];
        let db, auth, appId;

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); 
            
            document.getElementById('current-month-display').innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDayOfWeek = firstDay.getDay(); 
            
            const calendarGrid = document.getElementById('calendar-grid');
            calendarGrid.innerHTML = ''; 
            
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            dayNames.forEach((day, index) => {
                const dayEl = document.createElement('div');
                dayEl.className = `text-center font-bold text-sm py-2 bg-white/40 rounded-xl shadow-sm border border-white/50 ${index === 0 ? 'text-red-500' : index === 6 ? 'text-blue-500' : 'text-gray-600'}`;
                dayEl.innerText = day;
                calendarGrid.appendChild(dayEl);
            });
            
            for (let i = 0; i < startDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'bg-white/20 rounded-xl min-h-[100px] border border-white/20 hidden sm:block';
                calendarGrid.appendChild(emptyCell);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'bg-white/70 backdrop-blur-sm rounded-xl min-h-[100px] p-1.5 sm:p-2 border border-white/50 hover:bg-white hover:shadow-md transition-all relative flex flex-col gap-1.5';
                
                const dayOfWeek = (startDayOfWeek + day - 1) % 7;
                const dateHeader = document.createElement('div');
                dateHeader.className = 'flex justify-end';

                const dateLabel = document.createElement('span');
                dateLabel.className = `text-sm font-bold w-7 h-7 flex items-center justify-center rounded-full ${dayOfWeek === 0 ? 'text-red-500' : dayOfWeek === 6 ? 'text-blue-500' : 'text-gray-700'}`;
                dateLabel.innerText = day;
                
                const today = new Date();
                if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
                    dateLabel.className = 'text-sm font-bold w-7 h-7 flex items-center justify-center rounded-full bg-brand text-white shadow-md';
                }
                
                dateHeader.appendChild(dateLabel);
                cell.appendChild(dateHeader);
                
                const dayEvents = allEvents.filter(ev => {
                    if (!ev.date) return false;
                    
                    try {
                        const dateOnlyStr = String(ev.date).split('T')[0].split(' ')[0];
                        const parts = dateOnlyStr.split(/[-/]/);
                        
                        if (parts.length >= 3) {
                            const evYear = parseInt(parts[0], 10);
                            const evMonth = parseInt(parts[1], 10);
                            const evDay = parseInt(parts[2], 10);
                            
                            return evYear === year && (evMonth - 1) === month && evDay === day;
                        }
                    } catch (e) {
                        console.warn("日付データの形式エラー:", ev);
                    }
                    
                    const strictDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    return ev.date === strictDateStr;
                });
                
                dayEvents.forEach(ev => {
                    const evEl = document.createElement('div');
                    evEl.className = 'text-[11px] sm:text-xs font-bold px-1.5 py-1 rounded-md truncate cursor-pointer shadow-sm border transform hover:scale-105 transition-transform';
                    
                    if (ev.type === 'cleaning') {
                        evEl.className += ' bg-blue-50 text-blue-700 border-blue-200';
                    } else if (ev.type === 'event') {
                        evEl.className += ' bg-amber-50 text-amber-700 border-amber-200';
                    } else { // eco
                        evEl.className += ' bg-green-50 text-green-700 border-green-200';
                    }
                    evEl.innerText = ev.title;
                    cell.appendChild(evEl);
                });
                
                calendarGrid.appendChild(cell);
            }
            
            document.getElementById('calendar-loading').classList.add('hidden');
            document.getElementById('calendar-grid').classList.remove('hidden');
        }

        document.getElementById('prev-month').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        document.getElementById('next-month').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        async function initFirebase() {
            try {
                let firebaseConfig;
                let isCanvasEnv = false;

                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'yscl-demo-app';
                    isCanvasEnv = true;
                } else {
                    firebaseConfig = {
                        apiKey: "AIzaSyB0bA9zhU9ffNSkKp5E-ebEEI9mCkzPgms",
                        authDomain: "yscl-web-calendar.firebaseapp.com",
                        projectId: "yscl-web-calendar",
                        storageBucket: "yscl-web-calendar.firebasestorage.app",
                        messagingSenderId: "315878967352",
                        appId: "1:315878967352:web:97611d05d15828c52c3ecd",
                        measurementId: "G-DLP2P9JK0E"
                    };
                }

                if (firebaseConfig) {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);

                    if (isCanvasEnv) {
                        auth = getAuth(app);
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (authError) {
                            console.warn("プレビュー環境の認証スキップ:", authError.message);
                        }
                    }

                    let eventsRef;
                    let collectionName = 'yscl-calendar'; 

                    if (isCanvasEnv) {
                        eventsRef = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                    } else {
                        eventsRef = collection(db, collectionName);
                        console.log(`📡 [通信開始] コレクション「${collectionName}」を読み込んでいます... (認証なし)`);
                    }
                    
                    onSnapshot(eventsRef, (snapshot) => {
                        console.log(`✅ [データ取得完了] 「${collectionName}」から ${snapshot.size} 件の予定を取得しました！`);
                        
                        allEvents = snapshot.docs.map(doc => {
                            const data = doc.data();
                            console.log(`📄 データの中身 (ID: ${doc.id}):`, data);
                            return { id: doc.id, ...data };
                        });
                        
                        renderCalendar();
                    }, (error) => {
                        console.error("❌ [Firestoreエラー] データの読み込みに失敗しました:", error);
                        fallbackData();
                    });

                } else {
                    fallbackData();
                }
            } catch (error) {
                console.error("Firebase初期化エラー:", error);
                fallbackData();
            }
        }

        function fallbackData() {
            const todayStr = new Date().toISOString().split('T')[0];
            allEvents = [
                { date: todayStr, title: "テスト: 定期清掃", type: "cleaning" }
            ];
            renderCalendar();
        }

        initFirebase();
    </script>
