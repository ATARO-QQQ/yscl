    <main class="flex-grow max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 sm:py-16 space-y-12 animate-fade-in-up">
        
        <div class="glass-card rounded-[2rem] p-10 md:p-14 text-center relative overflow-hidden group shadow-lg border-b-4 border-brand">
            <div class="absolute inset-0 pattern-dots text-brand opacity-10 group-hover:opacity-20 transition-opacity"></div>
            <div class="absolute -left-10 -bottom-10 opacity-[0.03] group-hover:opacity-[0.06] transition-opacity duration-500 transform group-hover:-rotate-12 z-0">
                <i data-lucide="newspaper" class="w-64 h-64 text-brand"></i>
            </div>
            
            <div class="relative z-10 flex flex-col items-center">
                <div class="inline-flex items-center justify-center p-4 bg-gradient-to-br from-brand-light to-white text-brand rounded-2xl mb-6 shadow-md transform group-hover:scale-110 group-hover:rotate-6 transition-all duration-300 border border-white">
                    <i data-lucide="newspaper" class="w-10 h-10"></i>
                </div>
                <h1 class="text-3xl md:text-5xl font-black text-gray-800 tracking-tight mb-6">ニュース＆活動報告</h1>
                <p class="text-gray-700 font-bold max-w-2xl mx-auto text-lg leading-relaxed bg-white/60 p-5 rounded-2xl backdrop-blur-sm shadow-sm border border-white/50">
                    清掃ラボの最新情報や、日々の清掃活動・イベントの様子をお届けします。
                </p>
            </div>
        </div>

        <section class="glass-card rounded-[2rem] p-6 md:p-8 shadow-md border border-white/50">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button onclick="filterCategory('all')" id="btn-cat-all" class="category-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-all bg-brand text-white">
                        すべて
                    </button>
                    <button onclick="filterCategory('flash')" id="btn-cat-flash" class="category-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-all bg-white/80 hover:bg-white text-gray-700 border border-gray-200">
                        速報
                    </button>
                    <button onclick="filterCategory('report')" id="btn-cat-report" class="category-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-all bg-white/80 hover:bg-white text-gray-700 border border-gray-200">
                        活動報告
                    </button>
                    <button onclick="filterCategory('info')" id="btn-cat-info" class="category-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-all bg-white/80 hover:bg-white text-gray-700 border border-gray-200">
                        お知らせ
                    </button>
                </div>
                
                <div class="relative w-full md:w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </span>
                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="ニュースを検索..." class="w-full pl-10 pr-4 py-2.5 rounded-full border border-gray-200 shadow-sm focus:border-brand focus:ring focus:ring-brand focus:ring-opacity-40 bg-white/80">
                </div>
            </div>
        </section>

        <section class="relative">
            <div id="news-loading" class="text-center py-24 text-gray-500 font-bold flex flex-col items-center justify-center bg-white/50 rounded-[2rem] border border-white/50 backdrop-blur-sm shadow-sm">
                <i data-lucide="loader-2" class="w-12 h-12 animate-spin mb-4 text-brand"></i>
                ニュースを読み込んでいます...
            </div>

            <div id="news-empty" class="hidden text-center py-20 text-gray-500 font-bold flex flex-col items-center justify-center bg-white/50 rounded-[2rem] border border-white/50 backdrop-blur-sm shadow-sm">
                <i data-lucide="folder-open" class="w-12 h-12 mb-4 text-gray-400"></i>
                該当するニュースが見つかりませんでした。
            </div>

            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>
        </section>
    </main>

    <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden animate-fade-in">
        <div class="glass-card w-full max-w-3xl rounded-[2rem] overflow-hidden shadow-2xl border border-white max-h-[90vh] flex flex-col bg-white/95">
            <div class="p-6 border-b border-gray-100 flex justify-between items-start">
                <div>
                    <div class="flex items-center gap-3 mb-2">
                        <span id="modal-category" class="text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider">カテゴリ</span>
                        <span id="modal-date" class="text-sm font-bold text-gray-500">日付</span>
                    </div>
                    <h2 id="modal-title" class="text-xl md:text-2xl font-black text-gray-800 leading-snug">タイトル</h2>
                </div>
                <button onclick="closeModal()" class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500 hover:text-gray-800">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div class="p-6 md:p-8 overflow-y-auto flex-grow prose max-w-none text-gray-700 font-medium leading-relaxed" id="modal-content">
            </div>
            
            <div class="p-6 border-t border-gray-100 bg-gray-50/50 flex justify-between items-center text-sm font-bold text-gray-500">
                <span id="modal-author" class="flex items-center gap-1.5"><i data-lucide="user" class="w-4 h-4"></i> 投稿者: --</span>
                <button onclick="closeModal()" class="bg-gray-800 hover:bg-gray-700 text-white px-6 py-2.5 rounded-full shadow-md transition-colors">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 mt-auto border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                
                <div class="flex flex-col items-center md:items-start gap-4">
                    <img src="https://ataro-qqq.github.io/yscl/img/rogomojiw.png" alt="清掃ラボ ロゴ" class="h-8 w-auto opacity-75 brightness-0 invert">
                    <div class="bg-gray-800 px-4 py-2 rounded-full text-sm font-bold text-gray-300 shadow-sm flex items-center gap-2 border border-gray-700">
                        <i data-lucide="clock" class="w-4 h-4 text-brand-light"></i>
                        <span id="datetime-display">日時を取得中...</span>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-3 text-sm text-gray-400 font-medium">
                    <div class="flex flex-wrap justify-center gap-4 mb-1">
                        <a href="https://www.soei.ed.jp/" class="hover:text-white transition-colors bg-gray-800 px-3 py-1 rounded-full border border-gray-700">学校HP</a>
                        <a href="https://www.soei.ed.jp/s_junior/j_club/" class="hover:text-white transition-colors bg-gray-800 px-3 py-1 rounded-full border border-gray-700">クラブ活動</a>
                        <button onclick="window.location.reload(true);" class="hover:text-white transition-colors cursor-pointer bg-gray-800 px-3 py-1 rounded-full border border-gray-700">ページ更新</button>
                    </div>
                    <p class="text-xs">※お使いの端末によっては、正しく表示されない場合がございます。</p>
                    <p>&copy; 2023 YOKOHAMA SOEI Junior & Senior High School Cleaning lab</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://ataro-qqq.github.io/yscl/script/index.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let allNews = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let db, auth, appId, user;

        const CATEGORIES = {
            flash: { label: '速報', class: 'bg-red-500 text-white border-red-600' },
            report: { label: '活動報告', class: 'bg-green-500 text-white border-green-600' },
            info: { label: 'お知らせ', class: 'bg-blue-500 text-white border-blue-600' },
            other: { label: 'その他', class: 'bg-gray-500 text-white border-gray-600' }
        };

        async function initFirebase() {
            try {
                let firebaseConfig;
                let isCanvasEnv = false;

                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'yscl-demo-app';
                    isCanvasEnv = true;
                } else {
                    firebaseConfig = {
                        apiKey: "AIzaSyB0bA9zhU9ffNSkKp5E-ebEEI9mCkzPgms",
                        authDomain: "yscl-web-calendar.firebaseapp.com",
                        projectId: "yscl-web-calendar",
                        storageBucket: "yscl-web-calendar.firebasestorage.app",
                        messagingSenderId: "315878967352",
                        appId: "1:315878967352:web:97611d05d15828c52c3ecd",
                        measurementId: "G-DLP2P9JK0E"
                    };
                    appId = 'yscl-calendar';
                }

                if (firebaseConfig) {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);

                    if (isCanvasEnv) {
                        auth = getAuth(app);
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (authError) {
                            console.warn("匿名認証をスキップしました (実環境では影響ありません):", authError.message);
                        }

                        onAuthStateChanged(auth, (authUser) => {
                            user = authUser;
                        });
                    }

                    fetchNewsData();

                } else {
                    fallbackData();
                }
            } catch (error) {
                console.error("Firebase初期化失敗:", error);
                fallbackData();
            }
        }

        function fetchNewsData() {
            if (!db) return;
            const newsRef = collection(db, 'artifacts', appId, 'public', 'data', 'news_posts');

            onSnapshot(newsRef, (snapshot) => {
                allNews = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                allNews.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                renderNews();
            }, (error) => {
                console.warn("Firestoreからのデータ取得に失敗しました (認証がない、またはセキュリティルールの影響):", error.message);
                fallbackData();
            });
        }

        function fallbackData() {
            const todayStr = new Date().toISOString().split('T')[0];
            allNews = [
                {
                    id: 'sample-1',
                    date: todayStr,
                    category: 'flash',
                    title: '【速報】清掃ラボの新しいWebシステムがスタートしました！',
                    content: 'いつも清掃ラボを応援していただきありがとうございます。このたび、清掃スケジュールや活動報告をより見やすくお届けするための、独自のニュースシステムが始動しました！今後の活動計画、ゴミゼロ大作戦の経過など、有益な情報をタイムリーに発信していきます。',
                    createdBy: 'システム管理者'
                },
                {
                    id: 'sample-2',
                    date: '2026-07-10',
                    category: 'report',
                    title: '中庭 of プランター整備と初夏の花植え活動報告',
                    content: '本日の放課後、有志のメンバー15名で中庭のプランターの土壌改良とマリーゴールドの植樹を行いました。夏の暑さに強い品種を選定し、水やりの当番表を作成しました。学校にお越しの際はぜひ色鮮やかに咲くお花をご覧ください。',
                    createdBy: '緑化推進チーム部員'
                },
                {
                    id: 'sample-3',
                    date: '2026-07-05',
                    category: 'info',
                    title: '【お知らせ】第3回全体ミーティング開催日程について',
                    content: '次回、清掃ラボの全体進捗会議を7月18日(土)の昼休みに開催します。場所は第一多目的会議室です。議題は「夏休み特別エコ清掃活動のシフト決め」について。有志生徒の皆さんのご参加をお待ちしております！昼食を持参して参加可能です。',
                    createdBy: '清掃ラボ代表'
                }
            ];
            renderNews();
        }

        function renderNews() {
            const newsGrid = document.getElementById('news-grid');
            const loadingEl = document.getElementById('news-loading');
            const emptyEl = document.getElementById('news-empty');

            if (loadingEl) loadingEl.classList.add('hidden');
            if (!newsGrid) return;
            newsGrid.innerHTML = '';

            const filteredNews = allNews.filter(post => {
                const matchesCat = currentFilter === 'all' || post.category === currentFilter;
                const matchesSearch = searchQuery === '' || 
                    post.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                    post.content.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (filteredNews.length === 0) {
                if (emptyEl) emptyEl.classList.remove('hidden');
                newsGrid.classList.add('hidden');
                return;
            }

            if (emptyEl) emptyEl.classList.add('hidden');
            newsGrid.classList.remove('hidden');

            filteredNews.forEach(post => {
                const catInfo = CATEGORIES[post.category] || CATEGORIES.other;
                const card = document.createElement('div');
                card.className = "group glass-card rounded-[2rem] p-6 flex flex-col justify-between hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 border border-white cursor-pointer relative overflow-hidden";
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-center gap-3 mb-4">
                            <span class="${catInfo.class} text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider">${catInfo.label}</span>
                            <span class="text-xs font-bold text-gray-500">${post.date}</span>
                        </div>
                        <h3 class="text-lg font-black text-gray-800 mb-3 group-hover:text-brand transition-colors line-clamp-2">${escapeHtml(post.title)}</h3>
                        <p class="text-gray-600 font-medium text-sm leading-relaxed mb-6 line-clamp-3">${escapeHtml(post.content)}</p>
                    </div>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100 text-xs font-bold text-gray-400">
                        <span class="flex items-center gap-1"><i data-lucide="user" class="w-3.5 h-3.5"></i> ${escapeHtml(post.createdBy || '管理者')}</span>
                        <span class="text-brand hover:underline flex items-center gap-1 group-hover:translate-x-1 transition-transform">
                            詳細を読む <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                        </span>
                    </div>
                `;

                card.addEventListener('click', () => showDetail(post));
                newsGrid.appendChild(card);
            });

            lucide.createIcons();
        }

        window.showDetail = function(post) {
            const catInfo = CATEGORIES[post.category] || CATEGORIES.other;
            const modal = document.getElementById('detail-modal');
            
            document.getElementById('modal-category').innerText = catInfo.label;
            document.getElementById('modal-category').className = `${catInfo.class} text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider`;
            document.getElementById('modal-date').innerText = post.date;
            document.getElementById('modal-title').innerText = post.title;
            
            const escapedContent = escapeHtml(post.content).replace(/\n/g, '<br>');
            document.getElementById('modal-content').innerHTML = `<p>${escapedContent}</p>`;
            
            document.getElementById('modal-author').innerHTML = `<i data-lucide="user" class="w-4 h-4"></i> 投稿者: ${escapeHtml(post.createdBy || '管理者')}`;
            
            modal.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
            lucide.createIcons();
        };

        window.closeModal = function() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        };

        window.filterCategory = function(cat) {
            currentFilter = cat;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = "category-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-all bg-white/80 hover:bg-white text-gray-700 border border-gray-200";
            });
            
            const activeBtn = document.getElementById(`btn-cat-${cat}`);
            if (activeBtn) {
                activeBtn.className = "category-btn px-5 py-2.5 rounded-full font-bold text-sm shadow-sm transition-all bg-brand text-white";
            }
            
            renderNews();
        };

        window.handleSearch = function() {
            searchQuery = document.getElementById('search-input').value;
            renderNews();
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        initFirebase();
    </script>
</body>
</html>
